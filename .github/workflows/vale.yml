name: Vale

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vale:
    name: runner / vale
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
      - name: Install Vale
        run: |
          curl -sfL https://github.com/errata-ai/vale/releases/download/v3.13.1/vale_3.13.1_Linux_64-bit.tar.gz | tar -xz
          sudo mv vale /usr/local/bin/vale
      - name: Sync Vale packages
        run: vale sync
      - name: Lint
        run: vale skills
